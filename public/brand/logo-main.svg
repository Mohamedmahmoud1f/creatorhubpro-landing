<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 72" fill="none">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="proGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
  </defs>

  <!-- Icon Mark -->
  <rect x="4" y="4" width="64" height="64" rx="16" fill="url(#iconGrad)"/>
  <!-- Play/Content Triangle -->
  <polygon points="26,22 50,36 26,50" fill="white" opacity="0.95"/>
  <!-- AI Dot accent -->
  <circle cx="50" cy="22" r="5" fill="#f59e0b"/>

  <!-- Wordmark -->
  <text x="84" y="30" font-family="'Inter','Helvetica Neue',sans-serif" font-weight="800" font-size="22" fill="white" letter-spacing="-0.5">Creator</text>
  <text x="84" y="55" font-family="'Inter','Helvetica Neue',sans-serif" font-weight="800" font-size="22" fill="white" letter-spacing="-0.5">Hub<tspan fill="url(#proGrad)">Pro</tspan></text>

  <!-- Tagline -->
  <text x="84" y="68" font-family="'Inter','Helvetica Neue',sans-serif" font-weight="400" font-size="9" fill="rgba(255,255,255,0.45)" letter-spacing="2">AI-POWERED CONTENT SYSTEM</text>
</svg>
